### model
model_name_or_path: /home/liuzj/data/models/LLM-Research/Meta-Llama-3-8B
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,up_proj,down_proj

### dataset
dataset: commonsense_170k
dataset_dir: /home/liuzj/data/datasets/
template: alpaca
train_on_prompt: true
cutoff_len: 256
overwrite_cache: true
preprocessing_num_workers: 16
val_size: 0.001

### output
output_dir: /home/liuzj/code/LLaMA-Factory/runs/LLaMA3-8B/lora/new_sft
overwrite_output_dir: true
logging_steps: 10
save_strategy: steps
save_steps: 100
save_total_limit: 3
plot_loss: true
report_to: wandb

### train
per_device_train_batch_size: 2
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 100
fp16: true
ddp_backend: nccl
ddp_find_unused_parameters: false

### eval
eval_strategy: steps
eval_steps: 100
load_best_model_at_end: true
